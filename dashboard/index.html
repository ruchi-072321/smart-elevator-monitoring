<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Elevator Monitoring</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚨 Smart Elevator Monitoring Dashboard</h1>

<div class="cards">
    <div class="card"><h3>Elevator</h3><p id="elevator">--</p></div>
    <div class="card"><h3>Door</h3><p id="door">--</p></div>
    <div class="card"><h3>People</h3><p id="people">--</p></div>
    <div class="card"><h3>Temperature</h3><p id="temperature">-- °C</p></div>
    <div class="card"><h3>Weight</h3><p id="weight">--</p></div>
    <div class="card"><h3>Vibration</h3><p id="vibration">--</p></div>
    <div class="card"><h3>Status</h3><p id="status">NORMAL</p></div>
</div>

<div class="charts">
    <div class="chart-box">
        <h3>Temperature Trend</h3>
        <canvas id="tempChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Vibration Trend</h3>
        <canvas id="vibChart"></canvas>
    </div>
</div>

<div class="alert-box" id="alertBox">
    ⚠ No alerts
</div>

<script src="script.js"></script>

</body>
</html>
